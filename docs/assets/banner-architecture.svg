<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 200" role="img" aria-label="Architecture">
  <defs>
    <radialGradient id="bgA" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0500"/>
      <stop offset="60%" stop-color="#0a0408"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="ttlA" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd9c2"/>
      <stop offset="100%" stop-color="#ff2d00"/>
    </linearGradient>
    <filter id="gloA" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="g1"/>
      <feGaussianBlur stdDeviation="10" result="g2"/>
      <feMerge>
        <feMergeNode in="g2"/>
        <feMergeNode in="g1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cyA" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="200" fill="url(#bgA)"/>

  <!-- isometric grid: vertical lines -->
  <g stroke="#ff2d00" stroke-width="1" opacity="0.16">
    <line x1="160" y1="20" x2="160" y2="180"/>
    <line x1="320" y1="20" x2="320" y2="180"/>
    <line x1="480" y1="20" x2="480" y2="180"/>
    <line x1="800" y1="20" x2="800" y2="180"/>
    <line x1="960" y1="20" x2="960" y2="180"/>
    <line x1="1120" y1="20" x2="1120" y2="180"/>
  </g>
  <g stroke="#ff2d00" stroke-width="1" opacity="0.12">
    <line x1="40" y1="48" x2="1240" y2="48"/>
    <line x1="40" y1="156" x2="1240" y2="156"/>
  </g>

  <!-- corner brackets -->
  <g stroke="#ff6b1a" stroke-width="2" fill="none" filter="url(#gloA)">
    <polyline points="20,28 20,20 72,20"/>
    <polyline points="1260,28 1260,20 1208,20"/>
    <polyline points="20,172 20,180 72,180"/>
    <polyline points="1260,172 1260,180 1208,180"/>
  </g>

  <!-- title -->
  <text x="640" y="100" text-anchor="middle" font-size="56" letter-spacing="14"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-weight="900"
        fill="url(#ttlA)" filter="url(#gloA)">ARCHITECTURE</text>

  <!-- subtitle -->
  <text x="640" y="138" text-anchor="middle" font-size="11" letter-spacing="9"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        fill="#bff7ff" filter="url(#cyA)">SYSTEM   ·   LAYERS   ·   FLOWS   ·   INVARIANTS</text>

  <!-- accent rule -->
  <line x1="380" y1="158" x2="900" y2="158" stroke="#00d4ff" stroke-width="1" opacity="0.55" filter="url(#cyA)">
    <animate attributeName="opacity" values="0.25;0.7;0.25" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- node markers -->
  <g fill="#ff6b1a" filter="url(#gloA)">
    <polygon points="380,158 386,154 392,158 386,162"/>
    <polygon points="640,158 648,150 656,158 648,166"/>
    <polygon points="888,158 894,154 900,158 894,162"/>
  </g>

  <!-- moving scan -->
  <rect x="0" y="0" width="1280" height="2" fill="#00d4ff" opacity="0.4" filter="url(#cyA)">
    <animate attributeName="y" values="-4;200;-4" dur="6.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.5;0.5;0" keyTimes="0;0.1;0.9;1" dur="6.5s" repeatCount="indefinite"/>
  </rect>

  <text x="40" y="40" font-size="10" font-family="ui-monospace, monospace"
        fill="#ff6b1a" letter-spacing="2" filter="url(#gloA)">DOC//ARCH</text>
  <text x="1240" y="40" text-anchor="end" font-size="10" font-family="ui-monospace, monospace"
        fill="#00d4ff" letter-spacing="2" filter="url(#cyA)">10 SECTIONS</text>
</svg>
