<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 200" role="img" aria-label="Tutorial">
  <defs>
    <radialGradient id="bgT" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a0500"/>
      <stop offset="60%" stop-color="#0a0408"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="ttlT" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffd9c2"/>
      <stop offset="100%" stop-color="#ff2d00"/>
    </linearGradient>
    <filter id="gloT" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="g1"/>
      <feGaussianBlur stdDeviation="10" result="g2"/>
      <feMerge>
        <feMergeNode in="g2"/>
        <feMergeNode in="g1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="cyT" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1280" height="200" fill="url(#bgT)"/>

  <!-- code-rain effect via vertical streaks -->
  <g stroke="#ff2d00" stroke-width="1" opacity="0.18">
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="220" y1="0" x2="220" y2="200"/>
    <line x1="340" y1="0" x2="340" y2="200"/>
    <line x1="940" y1="0" x2="940" y2="200"/>
    <line x1="1060" y1="0" x2="1060" y2="200"/>
    <line x1="1180" y1="0" x2="1180" y2="200"/>
  </g>

  <!-- corner brackets -->
  <g stroke="#ff6b1a" stroke-width="2" fill="none" filter="url(#gloT)">
    <polyline points="20,28 20,20 72,20"/>
    <polyline points="1260,28 1260,20 1208,20"/>
    <polyline points="20,172 20,180 72,180"/>
    <polyline points="1260,172 1260,180 1208,180"/>
  </g>

  <text x="640" y="100" text-anchor="middle" font-size="56" letter-spacing="16"
        font-family="ui-monospace, 'SF Mono', Menlo, Consolas, monospace" font-weight="900"
        fill="url(#ttlT)" filter="url(#gloT)">TUTORIAL</text>

  <text x="640" y="138" text-anchor="middle" font-size="11" letter-spacing="9"
        font-family="ui-monospace, 'SF Mono', Menlo, monospace"
        fill="#bff7ff" filter="url(#cyT)">AUTHOR YOUR FIRST CARTRIDGE   ·   30 MIN</text>

  <line x1="380" y1="158" x2="900" y2="158" stroke="#00d4ff" stroke-width="1" opacity="0.55" filter="url(#cyT)">
    <animate attributeName="opacity" values="0.25;0.7;0.25" dur="3s" repeatCount="indefinite"/>
  </line>

  <!-- traveling code packets -->
  <g filter="url(#cyT)">
    <rect x="0" y="180" width="20" height="2" fill="#00d4ff" opacity="0.7">
      <animate attributeName="x" values="-30;1280;-30" dur="5.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="184" width="14" height="2" fill="#ff6b1a" opacity="0.7">
      <animate attributeName="x" values="-30;1280;-30" dur="6.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <text x="40" y="40" font-size="10" font-family="ui-monospace, monospace"
        fill="#ff6b1a" letter-spacing="2" filter="url(#gloT)">DOC//BUILD</text>
  <text x="1240" y="40" text-anchor="end" font-size="10" font-family="ui-monospace, monospace"
        fill="#00d4ff" letter-spacing="2" filter="url(#cyT)">trade-gasista</text>
</svg>
