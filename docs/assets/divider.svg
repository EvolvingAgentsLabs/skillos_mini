<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 24" role="img" aria-label="section divider">
  <defs>
    <linearGradient id="divGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="20%" stop-color="#ff2d00" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#ff6b1a" stop-opacity="1"/>
      <stop offset="80%" stop-color="#ff2d00" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0"/>
    </linearGradient>
    <filter id="divGlow" x="-10%" y="-200%" width="120%" height="500%">
      <feGaussianBlur stdDeviation="2" result="g"/>
      <feMerge>
        <feMergeNode in="g"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1280" height="24" fill="#000000"/>
  <line x1="0" y1="12" x2="1280" y2="12" stroke="url(#divGrad)" stroke-width="1.5" filter="url(#divGlow)"/>
  <!-- packet sliding across -->
  <circle r="3" fill="#bff7ff" filter="url(#divGlow)">
    <animateMotion dur="4.2s" repeatCount="indefinite" path="M 80 12 L 1200 12"/>
    <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.05;0.95;1" dur="4.2s" repeatCount="indefinite"/>
  </circle>
  <!-- diamond markers -->
  <g fill="#ff6b1a" filter="url(#divGlow)">
    <polygon points="120,12 126,6 132,12 126,18"/>
    <polygon points="640,12 648,4 656,12 648,20"/>
    <polygon points="1148,12 1154,6 1160,12 1154,18"/>
  </g>
</svg>
