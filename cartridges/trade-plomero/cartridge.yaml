name: trade-plomero
description: >
  Cartridge para plomeros residenciales en Uruguay. Diseñado urgencia-first:
  llamada → foto → diagnóstico vision-first ("dónde está la pérdida realmente")
  → mensaje al cliente → ejecución → reporte. Flow obra adicional para
  trabajos planificados con presupuesto formal.

category: trade
tags:
  - trade
  - plomero
  - residential
  - urgencia
  - on-device

entry_intents:
  - plomero
  - perdida agua
  - obstruccion
  - cañería rota
  - presion agua
  - sanitario
  - desagüe

flows:
  urgencia:
    - vision-diagnoser
    - client-message-writer
    - report-composer
  obra:
    - vision-diagnoser
    - quote-builder
    - report-composer

default_flow: urgencia

blackboard_schema:
  photo_set:        photo_set.schema.json
  diagnosis:        diagnosis.schema.json
  work_plan:        work_plan.schema.json
  quote:            quote.schema.json
  execution_trace:  execution_trace.schema.json
  client_report:    client_report.schema.json
  client_message:   client_message.schema.json

validators:
  - plumbing_checker.py

max_turns_per_agent: 3
preferred_tier: local

variables:
  currency: UYU
  tax_rate: 0.22
  region: Uruguay
  dialect: rioplatense
  warranty_default: >
    Garantía de 90 días sobre la mano de obra y los repuestos colocados,
    siempre que no haya manipulación por terceros ni cambios en condiciones
    de uso. No cubre fallas en cañerías o artefactos preexistentes ajenos
    a la intervención.
  professional_disclaimer: >
    Este reporte refleja el trabajo realizado por el profesional declarado
    en el pie de página. La aplicación asiste con documentación y
    diagnóstico orientativo; no sustituye juicio profesional ni inspección
    municipal cuando corresponda.

ui:
  brand_color: "#0EA5E9"
  accent_color: "#0369A1"
  emoji: "🔧"
  primary_action:
    label: "Atender llamada"
    flow: urgencia
    icon: alert
  secondary_actions:
    - label: "Presupuestar obra"
      flow: obra
      icon: clipboard
  library_default_mode: list

hooks:
  on_diagnosis_completed:
    - send_to_blackboard: client_message
  on_quote_generated:
    - send_to_blackboard: client_message
  on_job_closed:
    - generate_report: true
    - prompt_corpus_consent: false
