name: trade-electricista
description: >
  Cartridge para electricistas residenciales en Uruguay. Diagnóstico visual
  desde foto, plan de trabajo, presupuesto con materiales y mano de obra
  locales, ejecución con trazabilidad, y reporte final al cliente. Validadores
  deterministas aplican IEC 60364 (subset) — la regla vive en código, no en
  el prompt.

category: trade
tags:
  - trade
  - electricista
  - residential
  - on-device

entry_intents:
  - electricista
  - trabajo de electricidad
  - revisar instalación eléctrica
  - presupuesto eléctrico
  - reparación eléctrica
  - falla eléctrica

flows:
  intervention:
    - vision-diagnoser
    - quote-builder
    - report-composer
  quote_only:
    - vision-diagnoser
    - quote-builder

default_flow: intervention

blackboard_schema:
  photo_set:        photo_set.schema.json
  diagnosis:        diagnosis.schema.json
  work_plan:        work_plan.schema.json
  quote:            quote.schema.json
  execution_trace:  execution_trace.schema.json
  client_report:    client_report.schema.json

# .py files are canonical sources of truth for the rules. The mobile runner
# uses TS ports keyed by these filenames in validators_builtin.ts.
validators:
  - compliance_checker.py
  - repair_safety.py

max_turns_per_agent: 3
preferred_tier: local

variables:
  code: IEC_60364
  default_voltage: 230
  default_frequency: 50
  currency: UYU
  tax_rate: 0.22
  region: Uruguay
  dialect: rioplatense
  warranty_default: >
    Garantía de 6 meses sobre la mano de obra y los materiales instalados,
    siempre que no haya manipulación por terceros. No cubre fallas en
    instalaciones preexistentes ajenas a la intervención documentada.
  professional_disclaimer: >
    Este reporte refleja el trabajo realizado por el profesional declarado
    en el pie de página. La decisión final sobre intervenciones eléctricas
    es responsabilidad del electricista matriculado UTE actuante. Esta
    aplicación asiste con documentación y validaciones de norma; no
    sustituye juicio profesional.

ui:
  brand_color: "#2563EB"
  accent_color: "#1E40AF"
  emoji: "⚡"
  primary_action:
    label: "Nuevo trabajo"
    flow: intervention
    icon: bolt
  secondary_actions:
    - label: "Sólo presupuestar"
      flow: quote_only
      icon: clipboard
  library_default_mode: list

hooks:
  on_diagnosis_completed:
    - send_to_blackboard: client_explanation
  on_quote_generated:
    - send_to_blackboard: client_message
  on_job_closed:
    - generate_report: true
    # Off until v1.2 — see CLAUDE.md §10.
    - prompt_corpus_consent: false
