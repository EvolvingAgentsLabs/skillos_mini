name: cooking
description: >
  Meal planning, recipe authoring, and shopping-list generation for a
  household. Narrow domain so Gemma 4 can fill structured slots reliably.

entry_intents:
  - plan weekly menu
  - plan meals for the week
  - weekly meal plan
  - cook meals for
  - shopping list for the week
  - scale recipe for guests
  - adapt recipe for diet

# Declarative agent flows. Each flow is an ordered list of agent names
# (resolved against cartridges/cooking/agents/<name>.md).
flows:
  plan-weekly-menu:
    - menu-planner
    - shopping-list-builder
    - recipe-writer
  quick-shopping-list:
    - menu-planner
    - shopping-list-builder

default_flow: plan-weekly-menu

# Typed blackboard — maps key → JSON Schema filename under schemas/
blackboard_schema:
  weekly_menu: weekly_menu.schema.json
  shopping_list: shopping_list.schema.json
  recipes: recipes.schema.json

# Deterministic post-flow checks (pure Python, zero LLM calls).
validators:
  - menu_complete.py
  - shopping_list_sane.py

# Gemma-friendly defaults
max_turns_per_agent: 3

variables:
  locale: en_US
  default_household_size: 2
