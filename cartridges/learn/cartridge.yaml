name: learn
type: js-skills
description: >
  Research & Learn — a personal learning companion. Fetches information from
  Wikipedia, uses Gemma 4 as a subagent to extract insights, stores knowledge
  persistently, and generates quizzes from what you've learned.
  Demonstrates: LLM subagents, persistent state, skill chaining, knowledge
  compounding — all impossible with Gallery's Android implementation.

skills_source: skills

entry_intents:
  - learn about
  - research
  - teach me about
  - what is
  - explain
  - study
  - quiz me on
  - test my knowledge
  - what have I learned
  - knowledge stats

flows:
  # Full pipeline: fetch → analyze → store → quiz
  # 4 skills chained through the Blackboard. Gemma 4 called inside
  # insight-extractor and quiz-generator as a subagent.
  learn:
    - skill: query-wikipedia
      needs: [user_goal]
      produces: [wiki_data]
    - skill: insight-extractor
      needs: [wiki_data, user_goal]
      produces: [insights]
    - skill: knowledge-tracker
      needs: [user_goal, insights]
      produces: [store_result]
      data_map:
        topic: user_goal
        insights: insights
      defaults:
        action: store

  # Research only: fetch + analyze (no persistent storage)
  research:
    - skill: query-wikipedia
      needs: [user_goal]
      produces: [wiki_data]
    - skill: insight-extractor
      needs: [wiki_data, user_goal]
      produces: [insights]

  # Quiz from stored knowledge
  quiz:
    - skill: quiz-generator
      needs: [user_goal]
      produces: [quiz]
      data_map:
        topic: user_goal
      defaults:
        count: 3
        style: multiple_choice

  # Review: check what you know
  review:
    - skill: knowledge-tracker
      needs: [user_goal]
      produces: [knowledge]
      data_map:
        topic: user_goal
      defaults:
        action: query

  # Stats: learning progress
  stats:
    - skill: knowledge-tracker
      needs: []
      produces: [stats]
      defaults:
        action: stats

default_flow: learn

blackboard_schema:
  wiki_data: wiki_data.schema.json
  insights: insights.schema.json

validators:
  - pipeline_ok.py

max_turns_per_agent: 2

variables:
  gemma_model: gemma4:e2b
  node_timeout: 60
